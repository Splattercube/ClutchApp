<!DOCTYPE html>
<html>
<head>
    <title>Upload Clip</title>
</head>
<body>

    <h1>Upload Valorant Clip</h1>

    <form id="uploadForm">
        <input type="file" id="video" accept="video/*" required>

        <input type="text" id="caption" placeholder="Caption">

        <input type="text" id="agent" placeholder="Agent">

        <input type="text" id="rank" placeholder="Rank">

        <button type="submit">Upload</button>
    </form>

    <script src="scripts/upload.js"></script>
</body>
</html>
